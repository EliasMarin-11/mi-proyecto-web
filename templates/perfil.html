<main class="main-perfil">
    <div class="perfil-layout-dual">

    <section class="perfil-tarjeta">
        <div class="perfil-avatar-wrapper">
            <img id="avatar-img" class="perfil-avatar" src="img/Usuario SINFONDO.png" alt="Avatar del usuario">
            <input type="file" id="input-avatar" accept="image/*" class="oculto">
        </div>

        <div class="perfil-cabecera">
            <h2 class="perfil-nombre" id="nombre-display">Cargando...</h2>
            <div class="icon-dummy-pencil" id="btn-editar-nombre" title="Editar nombre">
                <img src="img/lapiz.png" alt="Editar nombre" class="icono-lapiz">
            </div>
        </div>

        <form class="perfil-formulario" id="form-perfil">
            <div class="form-grupo">
                <label>Correo Electrónico</label>
                <input type="email" id="input-email" class="input-dummy input-oscuro" readonly>
            </div>

            <div class="form-grupo">
                <label>Tu plan actual</label>
                <div class="contenedor-plan">
                    <div class="etiqueta-plan" id="texto-plan">...</div>
                    <button type="button" class="btn-perfil btn-secundario btn-pequeno" id="btn-gestionar-plan">Gestionar</button>
                </div>
            </div>

            <button type="submit" class="btn-perfil" id="btn-guardar">Guardar Cambios</button>

            <hr class="perfil-separador">

            <button type="button" class="btn-perfil" id="btn-cambiar-password">Cambiar Contraseña</button>
        </form>

        <div class="perfil-enlaces-inferiores">
            <p>¿Has terminado de cocinar por hoy?</p>
            <a href="#" id="btn-logout">Cerrar Sesión</a>
        </div>
    </section>

    <aside class="perfil-aside-recetas">
        <div class="cabecera-aside">
            <h3 class="titulo-mis-recetas">Mis Recetas Creadas</h3>
            <button type="button" class="btn-nueva-receta-aside" id="btn-ir-nueva-receta">+ Nueva Receta</button>
        </div>

        <div id="contenedor-mis-recetas" class="contenedor-lista-recetas-aside"></div>
    </aside>

    </div>
</main>
