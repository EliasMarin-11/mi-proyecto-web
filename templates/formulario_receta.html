<main class="contenedor-crear-receta">
  <form id="formulario-nueva-receta" action="#" method="POST">

    <div class="cabecera-formulario">
      <input type="text" id="receta-titulo" placeholder="Nombre de tu deliciosa receta..." class="input-titulo-principal" required minlength="5">
    </div>

    <div class="formulario-dos-columnas">

      <div class="columna-izquierda">

        <div class="grupo-input grupo-doble">
          <input type="number" id="receta-tiempo-num" placeholder="Tiempo" class="input-linea input-mitad" required min="1" step="1">
          <select id="receta-tiempo-unidad" class="input-linea input-mitad" required>
            <option value="min">Minutos</option>
            <option value="horas">Horas</option>
          </select>
        </div>

        <div class="grupo-input">
          <input type="number" id="receta-raciones" placeholder="Raciones (ej. 4)" class="input-linea" required min="1" step="1">
        </div>

        <div class="grupo-input">
          <select id="receta-dificultad" class="input-linea" required>
            <option value="" disabled selected>Nivel de dificultad...</option>
            <option value="facil">Fácil</option>
            <option value="media">Media</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>

        <h3 class="titulo-seccion-form">Alérgenos presentes</h3>
        <div class="grupo-etiquetas" id="contenedor-alergenos">
          <button type="button" class="etiqueta">Gluten</button>
          <button type="button" class="etiqueta">Crustáceos</button>
          <button type="button" class="etiqueta">Huevos</button>
          <button type="button" class="etiqueta">Pescado</button>
          <button type="button" class="etiqueta">Cacahuetes</button>
          <button type="button" class="etiqueta">Soja</button>
          <button type="button" class="etiqueta">Lácteos</button>
          <button type="button" class="etiqueta">Frutos secos</button>
          <button type="button" class="etiqueta">Apio</button>
          <button type="button" class="etiqueta">Mostaza</button>
          <button type="button" class="etiqueta">Sésamo</button>
          <button type="button" class="etiqueta">Sulfitos</button>
          <button type="button" class="etiqueta">Altramuces</button>
          <button type="button" class="etiqueta">Moluscos</button>
        </div>

        <h3 class="titulo-seccion-form">Dieta</h3>
        <div class="grupo-etiquetas" id="contenedor-dieta">
          <button type="button" class="etiqueta">Vegetariano</button>
          <button type="button" class="etiqueta">Vegano</button>
        </div>

        <h3 style="margin-top: 15px; font-size: 16px; font-weight: bold; color: #4E1A0A;">Tipo de Plato</h3>
        <div class="grupo-etiquetas" id="contenedor-tipo">
          <button type="button" class="etiqueta">Primero</button>
          <button type="button" class="etiqueta">Segundo</button>
          <button type="button" class="etiqueta">De Cuchara</button>
          <button type="button" class="etiqueta">Postre</button>
        </div>

        <div class="seccion-lista" id="contenedor-ingredientes">
          <h3>Ingredientes</h3>

          <div class="fila-ingrediente">
            <input type="number" step="any" min="0" placeholder="Cant." class="input-caja ing-cant" required>
            <select class="input-caja ing-medida" required>
              <option value="" disabled selected>Unidad</option>
              <option value="gr">Gramos (gr)</option>
              <option value="ml">Mililitros (ml)</option>
              <option value="ud">Unidades (ud)</option>
              <option value="cdas">Cucharadas</option>
              <option value="tazas">Tazas</option>
            </select>
            <input type="text" placeholder="Ingrediente (ej. Pollo)" class="input-caja ing-nombre" required>
          </div>

          <button type="button" class="btn-anadir" id="btn-add-ingrediente">+ Añadir ingrediente</button>
        </div>

        <div class="seccion-lista" id="contenedor-pasos">
          <h3>Instrucciones paso a paso</h3>

          <div class="fila-paso">
            <textarea placeholder="Paso 1: Empieza picando la cebolla muy fina..." class="textarea-paso paso-texto" required></textarea>
          </div>

          <button type="button" class="btn-anadir" id="btn-add-paso">+ Añadir paso</button>
        </div>
      </div>

      <div class="columna-derecha">

        <div class="caja-subir-foto" id="caja-foto-visual">
          <span class="icono-foto" id="icono-foto">📷</span>
          <p id="texto-foto">Sube una foto apetitosa de tu plato</p>
        </div>
        <input type="file" id="receta-imagen" accept="image/*" style="display:none;">

        <div class="grupo-descripcion">
          <h3>Breve descripción</h3>
          <textarea id="receta-desc" placeholder="Cuenta la historia de esta receta, por qué te gusta tanto, o si tienes algún truco especial..." class="textarea-desc" required minlength="10"></textarea>
        </div>

        <button type="submit" class="btn-guardar-principal">Publicar Receta</button>
      </div>
    </div>
  </form>
</main>
